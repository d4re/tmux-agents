# =========================================================================
# tmux-agents configuration — heavily commented for a tmux newcomer.
# Installed to ~/.config/tmux-agents/agents.conf by install.sh.
# Loaded only when you run `agents` (which uses dedicated socket `-L agents`
# and passes this file via `-f`). Will NOT affect other tmux sessions.
# =========================================================================

# ---- Prefix ----
# Change from default Ctrl-b to Ctrl-Space (no readline collision, mac-friendly).
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---- General ergonomics ----
set -g mouse on                                  # click panes/windows, scroll
set -g set-clipboard on                          # let tmux push copies to the terminal clipboard via OSC 52
set -g history-limit 50000                       # generous scrollback

# Some terminals (Apple Terminal, some WSL setups) silently drop OSC 52, so
# the re-emission `set-clipboard on` does on top of the outer terminal isn't
# enough. Bridge it: when any pane writes to the clipboard via OSC 52, also
# pipe the freshly-stored buffer to the system clipboard via
# clipboard-copy (installed alongside agents.conf; picks pbcopy / clip.exe /
# wl-copy / xclip / xsel, whichever is present — see config/clipboard-copy).
# Required for Claude inside a devcontainer, which has no host clipboard tool
# of its own and therefore relies entirely on OSC 52. Harmless on terminals
# that DO honor OSC 52 (iTerm2, Ghostty, etc.) — clipboard-copy just gets fed
# the same bytes a second time.
set-hook -g pane-set-clipboard 'run-shell -b "tmux -S #{socket_path} save-buffer - 2>/dev/null | ~/.config/tmux-agents/clipboard-copy"'
set -g base-index 0                              # ctrl at 0, agents fill in from 1 upward
set -g renumber-windows on                       # reindex on window close
set -g escape-time 20                            # snappy esc response (for vim inside)
set -g focus-events on                           # helps apps detect focus changes
setw -g mode-keys vi                             # vi-style copy-mode

# ---- Polling + visual bell ----
set -g status-interval 1                         # refresh status line every 1s
set -g monitor-bell on                           # watch for BEL in every window
set -g bell-action any                           # react to bells in any window
set -g visual-bell off                           # we color-flash via status, no beep

# ---- Title propagation ----
# Claude emits terminal title escapes; tmux captures them into #{pane_title}.
# We auto-rename windows to "<repo>:<pane_title>" when pane title changes,
# but agent-rename (Ctrl-Space E) can override this by setting a fixed name.
set -g allow-rename on
set -g set-titles on
set -g set-titles-string "#S:#W"

# The hook respects branch-pinned windows; --from-hook makes the rename
# command silently no-op on unknown/pinned/ctrl windows.
set-hook -g pane-title-changed 'run-shell -b "agent-rename --window-id #{window_id} --from-hook -- #{q:pane_title}"'

# ---- Status line ----
# `agent-state` does the host-side state poll AND emits the summary chunk
# in one Python invocation (single cold start per status-interval tick).
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=cyan]#S #[fg=white]│ "
set -g status-right "#(agent-state)  #[fg=white]│ %H:%M %a"

# Per-window coloring. `agent-state` (in status-right) sets @state_fg and
# @state_selected_fg on each non-ctrl window every tick. Inactive tabs
# tint their label with @state_fg. The active tab renders as a solid
# background block in the state color, with @state_selected_fg (derived
# from perceived luminance in theme.py — black for light state colors,
# white for dark ones) as the text fg. Windows without @state_fg yet
# (freshly created, or ctrl) fall back to plain reverse+bold for the
# active tab and the tmux default style for inactive tabs.
set -g window-status-format "#{?@state_fg,#[fg=#{@state_fg}],#[default]}#I:#W#{?window_flags,#{window_flags}, }"
set -g window-status-current-format "#{?@state_fg,#[bg=#{@state_fg}#,fg=#{@state_selected_fg}#,bold],#[reverse#,bold]} #I:#W#{?window_flags,#{window_flags}, } #[default]"

# ---- Mouse routing for the overview pane ----
# Single-click on any pane tagged @role=overview is forwarded to that pane
# (so the curses TUI can hit-test it) regardless of focus. All other panes
# match tmux's actual default (`select-pane -t = ; send-keys -M`): focus the
# pane AND pass the mouse event through, so MouseDrag1Pane can start a
# copy-mode selection from the click origin.
bind -T root MouseDown1Pane {
  if-shell -F '#{==:#{@role},overview}' \
    'send-keys -M -t =' \
    'select-pane -t= ; send-keys -M'
}

# ---- Keybindings ----
# N — new agent picker (fzf in a tmux popup)
# Two -E flags: auto-close on success, but keep the popup open on non-zero exit
# so failure stderr (e.g. agent-new's "could not read Username for github") stays
# readable. -k lets any key dismiss the frozen popup (not just Escape / C-c) —
# only available from tmux 3.5; older tmux (e.g. 3.4, current Ubuntu/Debian
# stable) rejects the flag outright and refuses to start, so it's conditional.
%if #{>=:#{version},3.5}
bind N display-popup -E -E -k -w 60% -h 60% 'agent-new'
# K — kill agent picker (fzf in a tmux popup)
bind K display-popup -E -E -k -w 60% -h 60% 'agent-kill'
%else
bind N display-popup -E -E -w 60% -h 60% 'agent-new'
bind K display-popup -E -E -w 60% -h 60% 'agent-kill'
%endif
# R — restore dead agent panes (revives every window whose Claude pane died).
# Idempotent: windows with a live pane are skipped. -b backgrounds the run so
# the keypress returns immediately and tmux never paints the worker's output
# over the active pane (the worker also detaches its own stdio); --background
# forks so containers/Claude come back up without blocking.
bind R run-shell -b 'agent-restore --background'
# E — rEname current window (preserves repo prefix). R is taken by restore, so
# rename falls to the next free letter of its verb.
bind E command-prompt -p "new branch name:" "run-shell 'agent-rename --window-id #{window_id} %%'"
# L — toggle layout between split and compact
bind L run-shell 'agent-layout'
# V — open the current agent's worktree in VS Code (host or attached-container)
bind V run-shell 'agent-vscode --window-id #{window_id}'
# T — pop up a shell in the current agent's worktree (host or `docker exec`).
# Wrapped in run-shell because display-popup does not expand #{window_id} in
# its command argument (run-shell does). Unlike the N / K pickers this is an
# interactive shell, so the flags differ: single -E closes the popup on *any*
# exit (Ctrl-D exits the login shell non-zero — z4h returns 130 — and a double
# -E would freeze the popup open on that), no -k (stray keys shouldn't dismiss
# a live shell), -T draws a "Ctrl-D to close" hint on the border, and the
# trailing `|| true` keeps run-shell from printing the shell's exit code as a
# "... returned 130" status message.
bind T run-shell "tmux display-popup -E -T '#[fg=yellow,bold] Ctrl-D to close ' -h 80% -w 80% 'agent-terminal --window-id #{window_id}' || true"
# 0 — jump to control window
bind 0 select-window -t:0
# s / w — native session / window pickers (already default, listed here for discoverability)
bind w choose-tree -Zw
bind s choose-tree -Zs

# ---- Copy mode (vi) ----
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "~/.config/tmux-agents/clipboard-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle
# Mouse drag: copy to the system clipboard on release and exit copy-mode so
# typing resumes in the underlying pane. (copy-pipe-no-clear would keep
# the highlight but trap keystrokes in copy-mode.)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/.config/tmux-agents/clipboard-copy"

# ---- Plugins (TPM) ----
# Plugins and TPM live under ~/.config/tmux-agents/plugins/ so they stay
# isolated from any other tmux config you might have.
#
# Session restore is handled by `agent-restore`. We do
# NOT install tmux-resurrect / tmux-continuum.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux-agents/plugins/"
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM — must be last line.
run '~/.config/tmux-agents/plugins/tpm/tpm'
